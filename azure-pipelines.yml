trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrServiceConnection: 'ACR Connection'
  acrLoginServer: 'grassequal.azurecr.io'
  imageName: 'carexpenses-api'

stages:
  - stage: Build
    displayName: 'Build and Push'
    jobs:
      - job: BuildAndPush
        displayName: 'Build and Push Image'
        steps:
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              containerRegistry: $(acrServiceConnection)
              command: 'login'

          - script: |
              docker build \
                -f Dockerfile \
                -t $(acrLoginServer)/$(imageName):$(Build.BuildId) \
                -t $(acrLoginServer)/$(imageName):latest \
                .
              docker push $(acrLoginServer)/$(imageName):$(Build.BuildId)
              docker push $(acrLoginServer)/$(imageName):latest
            displayName: 'Build and Push to ACR'
